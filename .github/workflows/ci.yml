name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python-agent/requirements.txt

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python dependencies
        run: python -m pip install -r python-agent/requirements.txt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Python and run tests
        run: |
          python -m compileall -q python-agent
          python -m unittest discover -s python-agent/tests -p "test_*.py" -v

      - name: Build frontend
        run: pnpm build:web

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml
